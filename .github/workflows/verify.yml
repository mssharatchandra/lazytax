name: Verify LazyTax

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  full-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check:full
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
